<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人资料 · 静泊小筑</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
    <header class="navbar">
        <div class="logo"><a href="/index.html">🌿 静泊小筑</a></div>
        <button class="menu-toggle" id="menuToggle" onclick="document.getElementById('navLinks').classList.toggle('active')"><i class="fa-solid fa-bars"></i></button>
        <nav class="nav-links" id="navLinks">
            <a href="/index.html">首页</a>
            <a href="/articles.html">文章</a>
            <a href="/gallery.html">相册</a>
            <a href="/treehole.html">树洞</a>
            <div class="auth-area" id="authArea">
                <div id="userMenuContainer" style="display:none; position:relative;">
                    <button id="userMenuBtn" onclick="document.getElementById('userDropdown').classList.toggle('dropdown-open');event.stopPropagation();" style="background:none;border:none;cursor:pointer;padding:0.5rem;border-radius:6px;display:flex;align-items:center;gap:0.5rem;color:#333;font-weight:500;">
                        <img id="navAvatar" src="" alt="" style="width:28px;height:28px;border-radius:50%;object-fit:cover;display:none;">
                        <span id="navUserName"></span>
                        <i class="fa-solid fa-chevron-down" style="font-size:0.625rem;color:#999;"></i>
                    </button>
                    <div id="userDropdown" class="user-dropdown-web">
                        <a href="/profile.html" class="dropdown-item"><i class="fa-regular fa-user"></i> 个人资料</a>
                        <a href="/my-interactions.html" class="dropdown-item"><i class="fa-regular fa-heart"></i> 我的互动</a>
                        <a href="/my-photos.html" class="dropdown-item"><i class="fa-regular fa-images"></i> 我的相册</a>
                        <a href="/editor.html" class="dropdown-item"><i class="fa-regular fa-pen-to-square"></i> 写文章</a>
                        <a href="/my-articles.html" class="dropdown-item"><i class="fa-regular fa-newspaper"></i> 我的文章</a>
                        <a href="/my-drafts.html" class="dropdown-item"><i class="fa-regular fa-file-lines"></i> 草稿箱</a>
                        <hr style="border:none;border-top:1px solid #f0f0f0;margin:0.25rem 0;">
                        <button id="logoutBtnDropdown" style="width:100%;text-align:left;background:none;border:none;padding:0.5rem 0.75rem;border-radius:4px;cursor:pointer;color:#ef4444;font-size:0.875rem;display:flex;align-items:center;gap:0.5rem;"><i class="fa-solid fa-right-from-bracket"></i> 注销</button>
                    </div>
                </div>
                <button id="loginBtn"><i class="fa-regular fa-user"></i> 登录</button>
            </div>
        </nav>
    </header>

    <main class="main-container">
        <div class="admin-layout">
            <aside class="admin-sidebar">
                <div class="admin-nav">
                    <a href="/index.html" class="admin-nav-item"><i class="fa-solid fa-house"></i> 返回首页</a>
                    <a href="/profile.html" class="admin-nav-item active"><i class="fa-regular fa-user"></i> 个人资料</a>
                    <a href="/my-interactions.html" class="admin-nav-item"><i class="fa-regular fa-heart"></i> 我的互动</a>
                    <a href="/my-photos.html" class="admin-nav-item"><i class="fa-regular fa-images"></i> 我的相册</a>
                    <a href="/editor.html" class="admin-nav-item"><i class="fa-regular fa-pen-to-square"></i> 写文章</a>
                    <a href="/my-articles.html" class="admin-nav-item"><i class="fa-regular fa-newspaper"></i> 我的文章</a>
                    <a href="/my-drafts.html" class="admin-nav-item"><i class="fa-regular fa-file-lines"></i> 草稿箱</a>
                </div>
            </aside>

            <div class="admin-content">
                <div class="admin-card">
                    <h2><i class="fa-regular fa-user"></i> 个人资料</h2>

                    <div class="profile-edit-section">
                        <div class="avatar-upload">
                            <div class="avatar-preview" id="avatarPreview">
                                <i class="fa-regular fa-circle-user"></i>
                            </div>
                            <div class="avatar-actions">
                                <label for="avatarInput" class="btn btn-primary"><i class="fa-solid fa-camera"></i> 更换头像</label>
                                <input type="file" id="avatarInput" accept="image/png,image/jpeg,image/gif" style="display:none;">
                                <p class="hint">支持 PNG、JPG、GIF，最大 5MB</p>
                            </div>
                        </div>
                    </div>

                    <form id="profileForm" class="profile-form">
                        <div class="form-group">
                            <label>用户名</label>
                            <div class="input-with-btn">
                                <input type="text" id="usernameInput" disabled>
                                <button type="button" class="btn btn-sm" id="editUsernameBtn">修改</button>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="nicknameInput">昵称</label>
                            <input type="text" id="nicknameInput" placeholder="输入昵称">
                        </div>

                        <div class="form-group">
                            <label for="bioInput">个人简介</label>
                            <textarea id="bioInput" rows="3" placeholder="介绍一下自己..."></textarea>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="emailInput">邮箱</label>
                                <input type="email" id="emailInput" placeholder="your@email.com">
                            </div>
                            <div class="form-group">
                                <label for="phoneInput">手机号</label>
                                <input type="tel" id="phoneInput" placeholder="13800138000">
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary"><i class="fa-regular fa-floppy-disk"></i> 保存资料</button>
                        </div>
                    </form>
                </div>

                <div class="admin-card">
                    <h2><i class="fa-solid fa-lock"></i> 修改密码</h2>
                    <form id="passwordForm" class="profile-form">
                        <div class="form-group">
                            <label for="oldPassword">当前密码</label>
                            <input type="password" id="oldPassword" required>
                        </div>
                        <div class="form-group">
                            <label for="newPassword">新密码</label>
                            <input type="password" id="newPassword" required minlength="6">
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword">确认新密码</label>
                            <input type="password" id="confirmPassword" required minlength="6">
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-key"></i> 修改密码</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <div class="footer-wrapper">
        <hr>
        <div class="footer-tip">✨ 静泊小筑 · 用代码记录成长，用文字分享经验</div>
    </div>

    <script src="/static/js/common.js"></script>
    <script src="/static/js/script.js"></script>
    <script src="/static/js/profile.js"></script>
</body>
</html>
