<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的相册 · 静泊小筑</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.11.6/viewer.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
    <header class="navbar">
        <div class="logo"><a href="/index.html">🌿 静泊小筑</a></div>
        <button class="menu-toggle" id="menuToggle" onclick="document.getElementById('navLinks').classList.toggle('active')"><i class="fa-solid fa-bars"></i></button>
        <nav class="nav-links" id="navLinks">
            <a href="/index.html">首页</a>
            <a href="/articles.html">文章</a>
            <a href="/gallery.html">相册</a>
            <a href="/treehole.html">树洞</a>
            <div class="auth-area" id="authArea">
                <div id="userMenuContainer" style="display:none; position:relative;">
                    <button id="userMenuBtn" onclick="document.getElementById('userDropdown').classList.toggle('dropdown-open');event.stopPropagation();" style="background:none;border:none;cursor:pointer;padding:0.5rem;border-radius:6px;display:flex;align-items:center;gap:0.5rem;color:#333;font-weight:500;">
                        <img id="navAvatar" src="" alt="" style="width:28px;height:28px;border-radius:50%;object-fit:cover;display:none;">
                        <span id="navUserName"></span>
                        <i class="fa-solid fa-chevron-down" style="font-size:0.625rem;color:#999;"></i>
                    </button>
                    <div id="userDropdown" class="user-dropdown-web">
                        <a href="/profile.html" class="dropdown-item"><i class="fa-regular fa-user"></i> 个人资料</a>
                        <a href="/my-interactions.html" class="dropdown-item"><i class="fa-regular fa-heart"></i> 我的互动</a>
                        <a href="/my-photos.html" class="dropdown-item"><i class="fa-regular fa-images"></i> 我的相册</a>
                        <a href="/editor.html" class="dropdown-item"><i class="fa-regular fa-pen-to-square"></i> 写文章</a>
                        <a href="/my-articles.html" class="dropdown-item"><i class="fa-regular fa-newspaper"></i> 我的文章</a>
                        <a href="/my-drafts.html" class="dropdown-item"><i class="fa-regular fa-file-lines"></i> 草稿箱</a>
                        <hr style="border:none;border-top:1px solid #f0f0f0;margin:0.25rem 0;">
                        <button id="logoutBtnDropdown" style="width:100%;text-align:left;background:none;border:none;padding:0.5rem 0.75rem;border-radius:4px;cursor:pointer;color:#ef4444;font-size:0.875rem;display:flex;align-items:center;gap:0.5rem;"><i class="fa-solid fa-right-from-bracket"></i> 注销</button>
                    </div>
                </div>
                <button id="loginBtn"><i class="fa-regular fa-user"></i> 登录</button>
            </div>
        </nav>
    </header>

    <main class="main-container">
        <div class="admin-layout">
            <aside class="admin-sidebar">
                <div class="admin-nav">
                    <a href="/index.html" class="admin-nav-item"><i class="fa-solid fa-house"></i> 返回首页</a>
                    <a href="/profile.html" class="admin-nav-item"><i class="fa-regular fa-user"></i> 个人资料</a>
                    <a href="/my-interactions.html" class="admin-nav-item"><i class="fa-regular fa-heart"></i> 我的互动</a>
                    <a href="/my-photos.html" class="admin-nav-item active"><i class="fa-regular fa-images"></i> 我的相册</a>
                    <a href="/editor.html" class="admin-nav-item"><i class="fa-regular fa-pen-to-square"></i> 写文章</a>
                    <a href="/my-articles.html" class="admin-nav-item"><i class="fa-regular fa-newspaper"></i> 我的文章</a>
                    <a href="/my-drafts.html" class="admin-nav-item"><i class="fa-regular fa-file-lines"></i> 草稿箱</a>
                </div>
            </aside>

            <div class="admin-content">
                <div class="admin-card">
                    <div class="my-articles-header">
                        <h2><i class="fa-regular fa-images"></i> 我的相册</h2>
                        <button id="uploadPhotoBtn" class="btn btn-primary"><i class="fa-solid fa-cloud-arrow-up"></i> 上传图片</button>
                    </div>

                    <div class="gallery-grid" id="myPhotosGrid">
                        <div class="loading-placeholder" style="grid-column:1/-1;text-align:center;padding:3rem;color:#999;"><i class="fa-solid fa-spinner fa-spin"></i> 加载中...</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="uploadModal" class="modal">
        <div class="modal-content" style="max-width:480px;">
            <div class="modal-header">
                <h3>上传图片</h3>
                <button class="modal-close" id="uploadModalClose"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <div id="uploadDropZone" style="border:2px dashed #ddd;border-radius:8px;padding:2rem;text-align:center;cursor:pointer;transition:border-color 0.2s;">
                    <i class="fa-solid fa-cloud-arrow-up" style="font-size:2rem;color:#999;margin-bottom:0.75rem;"></i>
                    <p style="color:#666;margin:0 0 0.5rem;">点击选择或拖拽图片到此处</p>
                    <p style="color:#999;font-size:0.8rem;margin:0;">支持 JPG、PNG、GIF，最大 5MB</p>
                </div>
                <input type="file" id="photoFileInput" accept="image/*,.heic,.heif" style="display:none;" multiple>
                <div id="uploadPreview" style="display:none;margin-top:1rem;"></div>
                <div id="uploadProgress" style="display:none;margin-top:1rem;">
                    <div style="background:#e5e7eb;border-radius:4px;height:8px;overflow:hidden;">
                        <div id="uploadProgressBar" style="background:#3b82f6;height:100%;width:0%;transition:width 0.3s;"></div>
                    </div>
                    <p id="uploadProgressText" style="text-align:center;font-size:0.8rem;color:#666;margin-top:0.5rem;"></p>
                </div>
                <div style="display:flex;justify-content:flex-end;gap:0.5rem;margin-top:1rem;">
                    <button type="button" id="choosePhotoBtn" class="btn" style="border:1px solid #d1d5db;background:#fff;color:#374151;">Choose Images</button>
                    <button type="button" id="startUploadBtn" class="btn btn-primary" disabled style="opacity:.6;cursor:not-allowed;">Start Upload</button>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-wrapper">
        <hr>
        <div class="footer-tip">✨ 静泊小筑 · 用代码记录成长，用文字分享经验</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.11.6/viewer.min.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/script.js"></script>
    <script src="/static/js/my-photos.js"></script>
</body>
</html>
